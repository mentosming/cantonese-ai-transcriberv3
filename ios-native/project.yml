# XcodeGen spec — generate the Xcode project with:  xcodegen generate
# (install once:  brew install xcodegen)
name: CantoAI
options:
  bundleIdPrefix: com.cantoai
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "8.0.0"
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios
    from: "5.0.0"
targets:
  CantoAI:
    type: application
    platform: iOS
    sources:
      - CantoAI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cantoai.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: "" # ← set your Apple Team ID
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.9"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        CODE_SIGN_ENTITLEMENTS: CantoAI/Resources/CantoAI.entitlements
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: RevenueCat
        product: RevenueCat
    info:
      path: CantoAI/Resources/Info.plist
      properties:
        CFBundleDisplayName: Canto AI
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        ITSAppUsesNonExemptEncryption: false
        NSMicrophoneUsageDescription: 用嚟錄音轉文字 / 生成字幕。
        NSPhotoLibraryUsageDescription: 用嚟匯入影片同相片到工作室。
        # Replace REVERSED_CLIENT_ID with the value from GoogleService-Info.plist.
        CFBundleURLTypes:
          - CFBundleURLSchemes: [REVERSED_CLIENT_ID]
